name: Deploy to GCP Cloud Storage

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: playground-s-11-20eee978
  GCS_BUCKET_NAME: kl-website-1775738478

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Storage
        run: |
          gsutil -m cp -r . gs://${{ env.GCS_BUCKET_NAME }}/
          echo "✅ Deployment complete!"
          echo "🌐 URL: https://storage.googleapis.com/${{ env.GCS_BUCKET_NAME }}/index.html"
