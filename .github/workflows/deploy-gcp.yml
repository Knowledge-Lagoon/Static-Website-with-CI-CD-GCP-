name: Deploy to GCP Cloud Storage

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Authenticate with gcloud (Application Default Credentials)
        run: |
          gcloud auth application-default login --no-launch-browser || true

      - name: Deploy to Cloud Storage
        run: |
          gsutil -m cp -r . gs://${{ env.GCS_BUCKET_NAME }}/
          echo "✅ Deployment complete!"
          echo "🌐 URL: https://storage.googleapis.com/${{ env.GCS_BUCKET_NAME }}/index.html"
